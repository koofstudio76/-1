<!-- SVG-ресурсы (градиенты + геометрия шестерёнок) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <radialGradient id="goldFill" cx="35%" cy="35%" r="85%">
      <stop offset="0%"  stop-color="#fff3b0"/>
      <stop offset="35%" stop-color="#ffd76a"/>
      <stop offset="65%" stop-color="#e7b948"/>
      <stop offset="100%" stop-color="#996c1d"/>
    </radialGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4bf"/>
      <stop offset="40%" stop-color="#d6a241"/>
      <stop offset="100%" stop-color="#6a4a18"/>
    </linearGradient>

    <!-- зуб (шаблон) -->
    <g id="tooth24"><rect x="-6" y="-90" width="12" height="36" rx="3" ry="3" fill="url(#goldEdge)"/></g>

    <!-- большая шестерня (24 зуба) -->
    <symbol id="gearBig" viewBox="-100 -100 200 200">
      <!-- зубья -->
      <g>
        <g transform="rotate(0)"><use href="#tooth24"/></g>
        <g transform="rotate(15)"><use href="#tooth24"/></g>
        <g transform="rotate(30)"><use href="#tooth24"/></g>
        <g transform="rotate(45)"><use href="#tooth24"/></g>
        <g transform="rotate(60)"><use href="#tooth24"/></g>
        <g transform="rotate(75)"><use href="#tooth24"/></g>
        <g transform="rotate(90)"><use href="#tooth24"/></g>
        <g transform="rotate(105)"><use href="#tooth24"/></g>
        <g transform="rotate(120)"><use href="#tooth24"/></g>
        <g transform="rotate(135)"><use href="#tooth24"/></g>
        <g transform="rotate(150)"><use href="#tooth24"/></g>
        <g transform="rotate(165)"><use href="#tooth24"/></g>
        <g transform="rotate(180)"><use href="#tooth24"/></g>
        <g transform="rotate(195)"><use href="#tooth24"/></g>
        <g transform="rotate(210)"><use href="#tooth24"/></g>
        <g transform="rotate(225)"><use href="#tooth24"/></g>
        <g transform="rotate(240)"><use href="#tooth24"/></g>
        <g transform="rotate(255)"><use href="#tooth24"/></g>
        <g transform="rotate(270)"><use href="#tooth24"/></g>
        <g transform="rotate(285)"><use href="#tooth24"/></g>
        <g transform="rotate(300)"><use href="#tooth24"/></g>
        <g transform="rotate(315)"><use href="#tooth24"/></g>
        <g transform="rotate(330)"><use href="#tooth24"/></g>
        <g transform="rotate(345)"><use href="#tooth24"/></g>
      </g>
      <!-- тело -->
      <circle r="90" fill="url(#goldFill)" stroke="url(#goldEdge)" stroke-width="6"/>
      <circle r="60" fill="url(#goldEdge)" opacity=".9"/>
      <circle r="54" fill="url(#goldFill)"/>
      <circle r="22" fill="#2a2014" opacity=".35"/>
    </symbol>

    <!-- маленькая шестерня (та же геометрия, масштаб через внешний контейнер) -->
    <symbol id="gearSmall" viewBox="-100 -100 200 200">
      <use href="#gearBig"/>
    </symbol>
  </defs>
</svg>